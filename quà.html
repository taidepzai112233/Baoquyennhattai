<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chúc Mừng 8/3 - Phép Màu</title>
<style>
  body, html {
    margin: 0; padding: 0; height: 100%;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffd1ff, #a1c4fd);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    display: flex; align-items: center; justify-content: center;
  }
  @keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }

  /* Màn hình mật khẩu */
  #password-screen {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(15px);
    width: 320px; border-radius: 30px; padding: 40px 20px;
    color: #d81b60; text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    border: 1px solid rgba(255,255,255,0.4);
    z-index: 100;
  }
  #password-screen input {
    width: 85%; padding: 12px; margin: 20px 0;
    border-radius: 50px; border: 2px solid #ff9a9e; outline: none;
    text-align: center; font-weight: bold; color: #d81b60;
  }
  #password-screen button {
    padding: 12px 35px; background: #ff4081; border: none;
    border-radius: 50px; color: white; font-weight: bold;
    cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 64, 129, 0.4);
  }

  /* Màn hình hiệu ứng */
  #effect-screen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
  
  /* Căn giữa bức thư tuyệt đối */
  #letter {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.8); /* Căn giữa */
    width: 85%; max-width: 400px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 30px; padding: 30px;
    text-align: center;
    font-family: 'Georgia', serif; font-size: 1.1rem; line-height: 1.8;
    opacity: 0; filter: blur(10px);
    z-index: 50; border: 2px solid #fff;
    box-shadow: 0 20px 60px rgba(255, 64, 129, 0.3);
    transition: all 2s ease-out;
  }
  
  /* Khi xuất hiện */
  #letter.active {
    opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0);
  }

  #letter::before { content: "✨💌✨"; font-size: 2.5rem; display: block; margin-bottom: 10px; }

  /* Hiệu ứng hoa/ảnh bay */
  .flower { position: absolute; width: 130px; opacity: 0; border-radius: 20px; z-index: 10; pointer-events: none; }
  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(110vh) rotate(0deg) scale(0.5); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-110vh) rotate(720deg) scale(1.2); }
  }

  #audio-control {
    position: fixed; top: 20px; right: 20px;
    font-size: 30px; cursor: pointer; z-index: 200;
  }
</style>
</head>
<body>

<div id="password-screen">
  <h2>💖 PHÉP MÀU 8/3 💖</h2>
  <input type="password" id="password-input" placeholder="Mật khẩu là 103103" />
  <br>
  <button id="submit-btn">MỞ QUÀ ✨</button>
  <div id="password-error" style="margin-top: 15px; color: #ff4081;"></div>
</div>

<div id="effect-screen">
  <img class="flower" style="left:5%; animation: floatUp 8s linear infinite 0s;" src="https://i.postimg.cc/cCpGyc8Z/Messenger-creation-0B08022C-3D30-4118-865C-1960C5C9ECE7.jpg" />
  <img class="flower" style="left:30%; animation: floatUp 10s linear infinite 2s;" src="https://i.postimg.cc/GtWnwjsw/Messenger_creation_466421CC_878F_41F3_939A_7B652FB58673.jpg" />
  <img class="flower" style="left:60%; animation: floatUp 7s linear infinite 1s;" src="https://i.postimg.cc/yxMC4TSH/Messenger_creation_BAC46BD1_5F76_4B53_9B5C_01DB424F3873.jpg" />
  <img class="flower" style="left:85%; animation: floatUp 9s linear infinite 3s;" src="https://i.postimg.cc/L5cFKVZS/Messenger_creation_D4EA7F37_50F3_4996_9833_230D1B9D4492.jpg" />

  <div id="letter">
    Chúc em có một ngày 8/3 thật nhiều niềm vui, hạnh phúc và ngập tràn yêu thương. <br><br>
    Cảm ơn em đã đến bên cuộc đời anh, mang tới những điều ngọt ngào nhất. <br><br>
    <strong style="color: #ff4081; font-size: 1.3rem;">💕 Yêu em rất nhiều! 💕</strong>
  </div>

  <div id="audio-control">🎵</div>
  
  <audio id="audio" loop>
    <source src="https://files.catbox.moe/bgjk32.mp4" type="audio/mp4">
  </audio>
</div>

<script>
  const correctPassword = "103103";
  const btn = document.getElementById("submit-btn");
  const audio = document.getElementById("audio");
  const letter = document.getElementById("letter");

  btn.addEventListener("click", () => {
    const pass = document.getElementById("password-input").value;
    if (pass === correctPassword) {
      document.getElementById("password-screen").style.display = "none";
      document.getElementById("effect-screen").style.display = "block";
      
      // Hiện thư sau khi hiệu ứng hoa bắt đầu
      setTimeout(() => {
        letter.classList.add("active");
      }, 1000);

      // Phát nhạc
      audio.play().catch(() => {
        // Dự phòng cho trình duyệt chặn tự động
        document.addEventListener('click', () => { audio.play(); }, { once: true });
      });
    } else {
      document.getElementById("password-error").textContent = "Sai mật khẩu rồi! 😂";
    }
  });

  // Nhấn Enter để gửi
  document.getElementById("password-input").addEventListener("keypress", (e) => {
    if (e.key === "Enter") btn.click();
  });

  // Tắt/Mở nhạc
  let isPlaying = true;
  document.getElementById("audio-control").addEventListener("click", () => {
    if (isPlaying) { audio.pause(); } else { audio.play(); }
    isPlaying = !isPlaying;
  });
</script>

</body>
</html>
